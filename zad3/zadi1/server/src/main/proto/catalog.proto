syntax = "proto3";

package catalog;

import "google/protobuf/empty.proto";

option java_multiple_files = true;
option java_package = "catalog";

service Catalog {
  rpc AddBook(AddBookRequest) returns (BookId);
  rpc FindByAuthor(AuthorQuery) returns (stream Book);
  rpc Summary(google.protobuf.Empty) returns (CatalogStats);
  rpc RemoveBook(BookId) returns (google.protobuf.Empty);
}

message Book {
  int32 id = 1;
  string title = 2;
  string author = 3;
  int32 year = 4;
  repeated string tags = 5;
}

message AddBookRequest {
  string title = 1;
  string author = 2;
  int32 year = 3;
  repeated string tags = 4;
}

message BookId {
  int32 id = 1;
}

message AuthorQuery {
  string author = 1;
  int32 limit = 2;
}

message CatalogStats {
  int32 total = 1;
  map<string, int32> by_author = 2;
  repeated Book recent = 3;
}
